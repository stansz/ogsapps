<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGS Apps</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #12131a;
      color: #e8eaf0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header img { height: 56px; border-radius: 50%; margin-bottom: 1rem; }
    .header h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.25em; color: #8890a8; }

    /* Tiles */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    a.tile {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      aspect-ratio: 1.6;
      background: #1a1d2e; border: 1px solid #2a2d40; border-radius: 12px;
      text-decoration: none; color: #d0d4e4;
      transition: all 0.2s;
    }
    a.tile:hover { background: #1e2238; border-color: #3a4060; transform: translateY(-2px); }
    .tile-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .tile-label { font-size: 0.9rem; font-weight: 500; }
    .tile-sub { font-size: 0.65rem; color: #6a7090; margin-top: 0.2rem; }

    /* Games */
    /* Games */
    .games-header { color: #4a5070; font-size: 0.7rem; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 0.6rem; text-align: center; }
    .games-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 2rem; }

    /* Transit chat */
    .transit-chat {
      background: #1a1d2e; border: 1px solid #2a2d40; border-radius: 12px;
      padding: 1rem 1.2rem; margin-bottom: 2rem;
    }
    .transit-title { font-size: 0.75rem; color: #6a7090; margin-bottom: 0.6rem; letter-spacing: 0.05em; }
    .transit-row { display: flex; gap: 0.5rem; }
    .transit-input {
      flex: 1; background: #10121a; border: 1px solid #2a2d40; border-radius: 10px;
      padding: 0.6rem 1rem; color: #e8eaf0; font-size: 0.85rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .transit-input:focus { border-color: #4a6fa5; box-shadow: 0 0 0 2px #4a6fa522; }
    .transit-input::placeholder { color: #4a5070; }
    .transit-go {
      background: linear-gradient(135deg, #2a4a7a, #1a3050); border: 1px solid #3a5a8a; border-radius: 10px;
      padding: 0.6rem 1rem; color: #d0d8f0; font-size: 0.8rem;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .transit-go:hover { background: linear-gradient(135deg, #3a5a8a, #2a4060); }
    .transit-result { margin-top: 0.6rem; font-size: 0.78rem; color: #8890a8; }
    .transit-route { padding: 0.4rem 0; border-bottom: 1px solid #222540; }
    .transit-route:last-child { border-bottom: none; }
    .transit-route-duration { color: #d0d4e4; font-weight: 500; }
    .transit-route-detail { color: #6a7090; font-size: 0.7rem; margin-top: 0.1rem; }
    .transit-more { margin-top: 0.4rem; }
    .transit-more a { color: #5a80b0; text-decoration: none; font-size: 0.7rem; transition: color 0.2s; }
    .transit-more a:hover { color: #8ab0d8; }
    .transit-loading { color: #4a5070; }

    /* Weather */
    .weather-card {
      background: #1a1d2e; border: 1px solid #2a2d40; border-radius: 12px;
      padding: 1.2rem 1.5rem; margin-bottom: 2rem;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .weather-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem;
    }
    .weather-header-left { display: flex; flex-direction: column; gap: 0.3rem; }
    .weather-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; }
    .weather-location { font-size: 0.8rem; color: #8890a8; }
    .weather-cities { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .weather-city-btn {
      background: #10121a; border: 1px solid #2a2d40; border-radius: 20px;
      color: #6a7090; padding: 0.2rem 0.65rem; font-size: 0.72rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .weather-city-btn:hover { color: #b0b8d0; border-color: #3a4060; }
    .weather-city-btn.active { color: #8ab0d8; border-color: #3b82f6; background: #1a2744; }
    .weather-refresh {
      background: none; border: 1px solid #2a2d40; border-radius: 6px;
      cursor: pointer; font-size: 0.75rem; color: #5a6080;
      padding: 0.15rem 0.5rem; transition: all 0.15s; font-family: inherit;
    }
    .weather-refresh:hover { color: #8ab0d8; border-color: #3a4060; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .weather-updated { font-size: 0.6rem; color: #3a4060; }
    .weather-current { display: flex; align-items: center; gap: 0.8rem; }
    .weather-icon { font-size: 2.5rem; }
    .weather-temp { font-size: 2rem; font-weight: 300; color: #f2f4f8; }
    .weather-cond { font-size: 0.85rem; color: #8890a8; }
    .weather-forecast {
      display: flex; gap: 1.2rem; margin-left: auto;
      border-left: 1px solid #2a2d40; padding-left: 1.5rem;
    }
    .forecast-day { text-align: center; font-size: 0.75rem; color: #6a7090; }
    .forecast-day .day-name { color: #8890a8; margin-bottom: 0.3rem; }
    .forecast-day .day-icon { font-size: 1.2rem; }
    .forecast-day .day-temps { margin-top: 0.2rem; }
    .forecast-day .day-high { color: #d0d4e4; }
    .forecast-day .day-low { color: #5a6080; }

    /* News */
    .news-section { margin-bottom: 2rem; }
    .news-tabs {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1rem; border-bottom: 1px solid #2a2d40; padding-bottom: 0.5rem;
    }
    .news-tab {
      background: none; border: 1px solid #2a2d40; border-radius: 20px;
      padding: 0.35rem 0.7rem; font-size: 0.72rem; color: #6a7090;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .news-tab:hover { color: #b0b8d0; border-color: #3a4060; }
    .news-tab.active { background: #1e2238; color: #e8ecf4; border-color: #3a5080; }
    .news-items { min-height: 120px; }
    .news-item {
      display: block; padding: 0.6rem 0;
      border-bottom: 1px solid #1e2030;
      text-decoration: none; color: #c0c8e0;
      transition: color 0.15s;
    }
    .news-item:hover { color: #f2f4f8; }
    .news-item:last-child { border-bottom: none; }
    .news-item-title { font-size: 0.85rem; line-height: 1.4; }
    .news-item-meta { font-size: 0.65rem; color: #4a5070; margin-top: 0.2rem; }
    .news-empty { color: #4a5070; font-size: 0.85rem; padding: 1rem 0; }

    /* Wiki Feed */
    .wiki-section { margin-bottom: 2rem; }
    .wiki-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .wiki-title { font-size: 0.8rem; color: #8890a8; letter-spacing: 0.08em; font-weight: 500; }
    .wiki-refresh { background: none; border: 1px solid #2a2d40; border-radius: 6px; cursor: pointer; font-size: 0.72rem; color: #5a6080; padding: 0.15rem 0.5rem; font-family: inherit; transition: all 0.15s; }
    .wiki-refresh:hover { color: #8ab0d8; border-color: #3a4060; }
    .wiki-cards { display: flex; flex-direction: column; gap: 0.6rem; }
    .wiki-card { display: flex; gap: 0.8rem; padding: 0.6rem; background: #1a1d2e; border: 1px solid #2a2d40; border-radius: 10px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: #c0c8e0; }
    .wiki-card:hover { border-color: #3a4060; background: #1e2238; color: #f2f4f8; }
    .wiki-card-img { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .wiki-card-body { flex: 1; min-width: 0; }
    .wiki-card-title { font-size: 0.82rem; font-weight: 500; margin-bottom: 0.2rem; line-height: 1.3; }
    .wiki-card-extract { font-size: 0.72rem; color: #6a7090; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .wiki-card-featured { border-color: #3a5060; }
    .wiki-card-featured .wiki-card-title { color: #8ab0d8; }
    .wiki-actions { display: flex; gap: 0.4rem; margin-top: 0.3rem; }
    .wiki-btn { background: none; border: 1px solid #2a2d40; border-radius: 20px; padding: 0.2rem 0.5rem; font-size: 0.65rem; color: #5a6080; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .wiki-btn:hover { color: #8ab0d8; border-color: #3a4060; }
    .wiki-btn.liked { color: #e06080; border-color: #5a3040; }
    .wiki-empty { color: #4a5070; font-size: 0.8rem; padding: 1rem 0; text-align: center; }

    /* Last updated */
    .last-updated {
      text-align: center; font-size: 0.65rem; color: #2a2d40;
      margin-top: 2rem;
    }

    /* Loading */
    .loading { color: #4a5070; font-size: 0.8rem; text-align: center; padding: 2rem; display: none; }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem; }
      .weather-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
      .weather-forecast { margin-left: 0; border-left: none; padding-left: 0; border-top: 1px solid #2a2d40; padding-top: 0.8rem; width: 100%; justify-content: space-around; }
      .tiles { grid-template-columns: repeat(3, 1fr); gap: 0.7rem; }
      .tile-icon { font-size: 1.5rem; }
      .tile-label { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.jpg" alt="OGS">
      <h1>OGS APPS</h1>
    </div>

    <div class="tiles">
      <a href="https://md.ogsapps.cc" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">📄</div>
        <div class="tile-label">MarkDown</div>
        <div class="tile-sub">Document Converter</div>
      </a>
      <a href="https://transit.ogsapps.cc" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🚆</div>
        <div class="tile-label">Transit</div>
        <div class="tile-sub">Routes & Schedules</div>
      </a>
      <a href="https://juxtapose.stansz.workers.dev" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🖼️</div>
        <div class="tile-label">Juxtapose</div>
        <div class="tile-sub">Image Slider</div>
      </a>
      <a href="https://elevation.ogsapps.cc" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🏔️</div>
        <div class="tile-label">Elevation & Distance</div>
        <div class="tile-sub">Trail Profiles</div>
      </a>
      <a href="https://stt.ogsapps.cc" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🎙️</div>
        <div class="tile-label">Speech to Text</div>
        <div class="tile-sub">Whisper STT</div>
      </a>
      <a href="https://synth-site.pages.dev" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🔊</div>
        <div class="tile-label">Synth</div>
        <div class="tile-sub">Sound Effects</div>
      </a>
    </div>

    <div class="games-header">🎮 GAMES</div>
    <div class="tiles">
      <a href="https://2048.ogsapps.cc" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🔢</div>
        <div class="tile-label">2048</div>
        <div class="tile-sub">Puzzle</div>
      </a>
      <a href="https://arcomage-site.pages.dev" class="tile" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon">🃏</div>
        <div class="tile-label">ArcoMage</div>
        <div class="tile-sub">Card Game</div>
      </a>
    </div>

    <div class="transit-chat" id="transitChat">
      <div class="transit-title">🚆 Quick Transit</div>
      <div class="transit-row">
        <input type="text" id="transitInput" class="transit-input" placeholder="Station A to Station B">
        <button class="transit-go" id="transitGo" onclick="transitSearch()">Go</button>
      </div>
      <div id="transitResult" class="transit-result"></div>
    </div>

    <div id="weatherCard" class="weather-card" style="display:none;"></div>
    <div id="newsSection" class="news-section" style="display:none;"></div>

    <div class="wiki-section">
      <div class="wiki-header">
        <span class="wiki-title">📚 WIKI FEED</span>
        <button class="wiki-refresh" id="wikiRefresh" onclick="refreshWikiFeed()">🔄 Refresh</button>
      </div>
      <div id="wikiCards" class="wiki-cards"></div>
    </div>

    <div id="loadingMsg" class="loading">Loading dashboard...</div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

  <script>
    const WEATHER_ICONS = {
      '113': '☀️', '116': '⛅', '119': '☁️', '122': '🌥️',
      '143': '🌫️', '176': '🌦️', '179': '🌨️', '182': '🌧️',
      '185': '🌧️', '200': '⛈️', '227': '🌨️', '230': '❄️',
      '248': '🌫️', '260': '🌫️', '263': '🌦️', '266': '🌧️',
      '281': '🌧️', '284': '🌧️', '293': '🌦️', '296': '🌧️',
      '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️',
      '311': '🌧️', '314': '🌧️', '317': '🌨️', '320': '🌨️',
      '323': '🌨️', '326': '🌨️', '329': '❄️', '332': '❄️',
      '335': '❄️', '338': '❄️', '350': '🌧️', '353': '🌦️',
      '356': '🌧️', '359': '🌧️', '362': '🌨️', '365': '🌨️',
      '368': '🌨️', '371': '❄️', '374': '🌨️', '377': '🌨️',
      '386': '⛈️', '389': '⛈️', '392': '⛈️', '395': '❄️',
    };

    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let dashboardData = null;
    let weatherCity = localStorage.getItem('weatherCity') || null;

    async function fetchDashboard() {
      try {
        const cityParam = weatherCity ? `?city=${encodeURIComponent(weatherCity)}` : '';
        const res = await fetch('/api/dashboard' + cityParam);
        if (!res.ok) throw new Error('API error');
        dashboardData = await res.json();
        renderAll();
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      } catch (e) {
        // Silent fail — just don't show dashboard sections
        console.error('Dashboard fetch error:', e);
      }
    }

    function renderAll() {
      renderWeather();
      renderNews();
    }

    function renderWeather() {
      const card = document.getElementById('weatherCard');
      const w = dashboardData.weather;
      if (!w || !w.current || w.current.temp === 'N/A') return;

      const city = weatherCity || w.current.city || 'Vancouver';
      const icon = WEATHER_ICONS[w.current.icon] || '🌡️';
      const forecastHtml = (w.forecast || []).map(d => {
        const date = new Date(d.date + 'T00:00:00');
        const dayName = DAY_NAMES[date.getDay()];
        return `<div class="forecast-day">
          <div class="day-name">${dayName}</div>
          <div class="day-icon">${WEATHER_ICONS[d.icon] || icon}</div>
          <div class="day-temps"><span class="day-high">${d.high}°</span> <span class="day-low">${d.low}°</span></div>
        </div>`;
      }).join('');

      card.innerHTML = `
        <div style="flex:1">
          <div class="weather-header">
            <div class="weather-header-left">
              <span class="weather-location">📍 ${esc(CITIES.find(c => c.query === (weatherCity || 'Vancouver,BC,Canada'))?.name || city)}</span>
              <div class="weather-cities">${CITIES.map(c =>
                `<button class="weather-city-btn${c.query === (weatherCity || 'Vancouver,BC,Canada') ? ' active' : ''}" onclick="switchWeatherCity('${c.query}','${c.name}')">${c.name}</button>`
              ).join('')}</div>
            </div>
            <div class="weather-header-right">
              <button class="weather-refresh" onclick="refreshWeather()" title="Refresh">🔄 Refresh</button>
              <span class="weather-updated" id="weatherUpdated"></span>
            </div>
          </div>
          <div class="weather-current">
            <div class="weather-icon">${icon}</div>
            <div>
              <div class="weather-temp">${w.current.temp}°C</div>
              <div class="weather-cond">${w.current.condition}</div>
            </div>
          </div>
        </div>
        <div class="weather-forecast">${forecastHtml}</div>
      `;

      card.style.display = 'flex';

      // Update timestamp
      const ts = document.getElementById('weatherUpdated');
      if (ts) ts.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }

    const CITIES = [
      { name: 'Vancouver', query: 'Vancouver,BC,Canada' },
      { name: 'Victoria', query: 'Victoria,BC,Canada' },
      { name: 'Toronto', query: 'Toronto,ON,Canada' },
      { name: 'Paris', query: 'Paris,France' },
    ];

    function switchWeatherCity(query, name) {
      localStorage.setItem('weatherCity', query);
      weatherCity = query;
      fetch(`/api/dashboard?city=${encodeURIComponent(query)}`)
        .then(r => r.json())
        .then(data => {
          if (data.weather) {
            dashboardData.weather = data.weather;
            renderWeather();
          }
        })
        .catch(() => {});
    }

    function refreshWeather() {
      const city = weatherCity || 'Vancouver,BC,Canada';
      const btn = document.querySelector('.weather-refresh');
      if (btn) btn.style.animation = 'spin 0.5s linear';
      fetch(`/api/dashboard?city=${encodeURIComponent(city)}`)
        .then(r => r.json())
        .then(data => {
          if (data.weather) {
            dashboardData.weather = data.weather;
            renderWeather();
          }
        })
        .catch(() => {})
        .finally(() => { if (btn) btn.style.animation = ''; });
    }

    function renderNews() {
      const section = document.getElementById('newsSection');
      const news = dashboardData.news;
      if (!news) return;

      const feeds = Object.keys(news);
      if (feeds.length === 0) return;

      const defaultTab = feeds.includes('CBC Top Stories') ? 'CBC Top Stories' : feeds[0];

      const tabsHtml = feeds.map(f =>
        `<button class="news-tab${f === defaultTab ? ' active' : ''}" data-feed="${f}">${f}</button>`
      ).join('');

      section.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid #2a2d40; padding-bottom: 0.5rem;">
          <div class="news-tabs">${tabsHtml}</div>
          <button class="news-refresh" id="newsRefresh" title="Refresh news" style="
            background: none;
            border: 1px solid #3a4060;
            border-radius: 20px;
            padding: 0.35rem 0.7rem;
            font-size: 0.72rem;
            color: #6a7090;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
          ">
            <span>↻</span>
            <span>Refresh</span>
          </button>
        </div>
        <div class="news-items" id="newsItems"></div>
      `;

      renderFeedItems(defaultTab);

      section.querySelectorAll('.news-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          section.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderFeedItems(tab.dataset.feed);
        });
      });

      document.getElementById('newsRefresh').addEventListener('click', () => {
        const btn = document.getElementById('newsRefresh');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span>↻</span><span>Refreshing...</span>';
        btn.disabled = true;
        fetchDashboard().then(() => {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }).catch(() => {
          btn.innerHTML = '<span>↻</span><span>Failed</span>';
          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }, 2000);
        });
      });

      section.style.display = 'block';
    }

    function renderFeedItems(feedName) {
      const container = document.getElementById('newsItems');
      const items = dashboardData.news[feedName] || [];
      if (items.length === 0) {
        container.innerHTML = '<div class="news-empty">No items available</div>';
        return;
      }
      container.innerHTML = items.map(item => {
        const time = item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-CA', {month:'short',day:'numeric'}) : '';
        return `<a class="news-item" href="${item.link}" target="_blank" rel="noopener">
          <div class="news-item-title">${item.title}</div>
          ${time ? `<div class="news-item-meta">${time}</div>` : ''}
        </a>`;
      }).join('');
    }

    // Init
    fetchDashboard();
    setInterval(fetchDashboard, 5 * 60 * 1000);

    // Transit chat
    const TRANSIT_API = 'https://maps.ogsapps.cc/api/transit/route';

    document.getElementById('transitInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') transitSearch();
    });

    async function transitSearch() {
      const input = document.getElementById('transitInput').value.trim();
      const result = document.getElementById('transitResult');

      const match = input.match(/^(.+?)\s+(?:to|→|->)\s+(.+)$/i);
      if (!match) {
        result.innerHTML = '<div style="color:#6a7090">Try: "Gateway Station to YVR Airport"</div>';
        return;
      }

      result.innerHTML = '<div class="transit-loading">Finding routes...</div>';

      try {
        const res = await fetch(`${TRANSIT_API}?from=${encodeURIComponent(match[1])}&to=${encodeURIComponent(match[2])}`);
        const data = await res.json();

        if (data.error || !data.routes || data.routes.length === 0) {
          result.innerHTML = '<div style="color:#6a7090">No routes found</div>';
          return;
        }

        const routes = data.routes.slice(0, 2).map(r => {
          const summary = r.steps.filter(s => s.type !== 'transfer').map(s => s.route).join(' → ');
          return `<div class="transit-route">
            <span class="transit-route-duration">${r.duration_min} min</span> · ${r.transfers === 0 ? 'Direct' : r.transfers + ' transfer'}
            <div class="transit-route-detail">${summary}</div>
          </div>`;
        }).join('');

        result.innerHTML = routes + `<div class="transit-more"><a href="https://transit.ogsapps.cc/?from=${encodeURIComponent(match[1])}&to=${encodeURIComponent(match[2])}" target="_blank">Full details →</a></div>`;
      } catch (e) {
        result.innerHTML = '<div style="color:#6a7090">Transit API unavailable</div>';
      }
    }

    // Auto-fill transit page from URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('from') && urlParams.get('to')) {
      document.getElementById('transitInput').value = urlParams.get('from') + ' to ' + urlParams.get('to');
      transitSearch();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ==================== WIKI FEED ====================
    const WIKI_ENGAGEMENT_KEY = 'wikiEngagement';
    const WIKI_SEEN_KEY = 'wikiSeen';
    let wikiArticles = [];
    let wikiQueue = [];
    let wikiCurrentIndex = 0;

    function getEngagement() {
      try { return JSON.parse(localStorage.getItem(WIKI_ENGAGEMENT_KEY) || '{}'); } catch { return {}; }
    }
    function saveEngagement(eng) {
      localStorage.setItem(WIKI_ENGAGEMENT_KEY, JSON.stringify(eng));
    }
    function getSeen() {
      try { return JSON.parse(localStorage.getItem(WIKI_SEEN_KEY) || '{}'); } catch { return {}; }
    }
    function saveSeen(seen) {
      localStorage.setItem(WIKI_SEEN_KEY, JSON.stringify(seen));
    }

    function engagePost(article, action) {
      const eng = getEngagement();
      const seen = getSeen();
      let score = 0;
      switch (action) {
        case 'scroll': score = -5; break;
        case 'like': score = 50 + 4 * (wikiCurrentIndex || 1); break;
        case 'click': score = 75; break;
        case 'image': score = 100; break;
      }
      // Apply score to categories
      const cats = article.categories || [];
      cats.forEach(c => { eng[c] = (eng[c] || 0) + score; });
      saveEngagement(eng);
      // Track seen
      seen[article.id] = (seen[article.id] || 0) + 1;
      saveSeen(seen);
    }

    function scoreArticle(article) {
      const eng = getEngagement();
      const seen = getSeen();
      const seenCount = seen[article.id] || 0;
      let base = 0;
      if (article.thumbnail) base += 5;
      if (seenCount > 0) base += (Math.pow(3, seenCount) - 1) * -5000;
      const catScore = (article.categories || []).reduce((s, c) => s + (eng[c] || 0), 0);
      return base + catScore;
    }

    function pickNextArticles(count) {
      if (wikiArticles.length === 0) return [];
      const picked = [];
      const pool = [...wikiArticles];
      for (let i = 0; i < count && pool.length > 0; i++) {
        const rand = Math.random();
        let article;
        if (rand < 0.42) {
          // Best scoring
          let bestIdx = 0, bestScore = -Infinity;
          pool.forEach((a, idx) => { const s = scoreArticle(a); if (s > bestScore) { bestScore = s; bestIdx = idx; } });
          article = pool.splice(bestIdx, 1)[0];
        } else if (rand < 0.82) {
          // Weighted random from small sample
          const sample = pool.length > 20 ? [...Array(20)].map(() => pool[Math.floor(Math.random() * pool.length)]) : pool;
          const scores = sample.map(a => Math.max(scoreArticle(a) + 1000, 1));
          const total = scores.reduce((a, b) => a + b, 0);
          let r = Math.random() * total, acc = 0;
          article = sample[0];
          for (let j = 0; j < sample.length; j++) { acc += scores[j]; if (r <= acc) { article = sample[j]; break; } }
          const idx = pool.indexOf(article);
          if (idx >= 0) pool.splice(idx, 1);
        } else {
          // Completely random
          article = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
        }
        picked.push(article);
      }
      return picked;
    }

    function renderWikiFeed(articles) {
      const container = document.getElementById('wikiCards');
      if (!articles || articles.length === 0) {
        container.innerHTML = '<div class="wiki-empty">Loading Wikipedia feed...</div>';
        return;
      }
      container.innerHTML = articles.map((a, i) => {
        const img = a.thumbnail ? `<img class="wiki-card-img" src="${esc(a.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
        const featured = a.featured ? ' wiki-card-featured' : '';
        const likes = getEngagement();
        const seen = getSeen();
        const isLiked = (likes[a.title] || 0) > 40; // liked if score > 40
        return `<a class="wiki-card${featured}" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" onclick="wikiClick(${i})">
          ${img}
          <div class="wiki-card-body">
            <div class="wiki-card-title">${esc(a.title)}</div>
            <div class="wiki-card-extract">${esc(a.extract || '')}</div>
            <div class="wiki-actions" onclick="event.preventDefault(); event.stopPropagation();">
              <button class="wiki-btn${isLiked ? ' liked' : ''}" onclick="wikiLike(${i}, this)">${isLiked ? '❤️' : '🤍'} Like</button>
              <button class="wiki-btn" onclick="wikiSkip(${i})">Skip →</button>
            </div>
          </div>
        </a>`;
      }).join('');
    }

    function wikiClick(i) { if (wikiQueue[i]) engagePost(wikiQueue[i], 'click'); }
    function wikiLike(i, btn) {
      if (wikiQueue[i]) {
        engagePost(wikiQueue[i], 'like');
        btn.classList.add('liked');
        btn.innerHTML = '❤️ Liked';
      }
    }
    function wikiSkip(i) {
      if (wikiQueue[i]) engagePost(wikiQueue[i], 'scroll');
      // Replace with new article
      const newOnes = pickNextArticles(1);
      if (newOnes.length > 0) {
        wikiQueue[i] = newOnes[0];
        renderWikiFeed(wikiQueue);
      }
    }

    async function fetchWikiFeed() {
      try {
        const res = await fetch('/api/wiki-feed');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        wikiArticles = data.articles || [];
        wikiQueue = pickNextArticles(10);
        renderWikiFeed(wikiQueue);
      } catch (e) {
        document.getElementById('wikiCards').innerHTML = '<div class="wiki-empty">Could not load wiki feed</div>';
      }
    }

    function refreshWikiFeed() {
      wikiQueue = pickNextArticles(10);
      renderWikiFeed(wikiQueue);
    }

    // Fetch wiki feed on load
    fetchWikiFeed();
  </script>
</body>
</html>
